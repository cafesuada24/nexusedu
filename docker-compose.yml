services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - DATABASE_URL=postgresql+psycopg://myuser:mypassword@db:5432/a20app
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      - redis
      - otel-collector
    networks:
      - nexusedu-net

  worker:
    build: .
    command: ["arq", "src.worker.WorkerSettings"]
    environment:
      - ENVIRONMENT=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - DATABASE_URL=postgresql+psycopg://myuser:mypassword@db:5432/a20app
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      - redis
      - otel-collector
    networks:
      - nexusedu-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=a20app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexusedu-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - nexusedu-net

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - nexusedu-net

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - nexusedu-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      - PROMETHEUS_QUERY_SUPPORT_SPAN_METRICS_CONNECTOR=true
      - PROMETHEUS_QUERY_NAMESPACE=traces_span_metrics
      - PROMETHEUS_QUERY_NORMALIZE_CALLS=true
      - PROMETHEUS_QUERY_NORMALIZE_DURATION=true
    networks:
      - nexusedu-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "8889:8889"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - prometheus
      - jaeger
    networks:
      - nexusedu-net

networks:
  nexusedu-net:
    driver: bridge

volumes:
  postgres_data:
