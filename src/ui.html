<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>EduAI · Analytics Dashboard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
            rel="stylesheet"
        />
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <style>
            :root {
                --bg-deep: #080c14;
                --glass: rgba(14, 22, 44, 0.75);
                --border: rgba(99, 140, 255, 0.13);
                --border-hi: rgba(120, 160, 255, 0.38);
                --accent: #6c8eff;
                --accent2: #c084fc;
                --accent3: #22d3ee;
                --text-hi: #e8eeff;
                --text-mid: #8da0c8;
                --text-lo: #4a5a80;
                --danger: #f87171;
                --success: #34d399;
                --warn: #fbbf24;
                --t: 0.44s cubic-bezier(0.22, 1, 0.36, 1);
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body,
            #root {
                height: 100%;
                overflow: hidden;
            }

            body {
                background: var(--bg-deep);
                font-family: "DM Sans", sans-serif;
                color: var(--text-hi);
            }

            /* mesh bg */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                background:
                    radial-gradient(
                        ellipse 70% 55% at 15% 5%,
                        rgba(108, 142, 255, 0.09) 0%,
                        transparent 60%
                    ),
                    radial-gradient(
                        ellipse 55% 50% at 85% 95%,
                        rgba(192, 132, 252, 0.07) 0%,
                        transparent 55%
                    ),
                    radial-gradient(
                        ellipse 40% 35% at 50% 50%,
                        rgba(34, 211, 238, 0.04) 0%,
                        transparent 60%
                    );
            }
            /* grain */
            body::after {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                opacity: 0.45;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
                background-size: 160px;
            }

            #root {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
            }

            ::-webkit-scrollbar {
                width: 3px;
                height: 3px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(108, 142, 255, 0.28);
                border-radius: 99px;
            }

            /* ══ HEADER ══ */
            .header {
                flex-shrink: 0;
                display: flex;
                align-items: center;
                gap: 11px;
                padding: 13px 28px;
                background: rgba(8, 12, 20, 0.88);
                border-bottom: 1px solid var(--border);
                backdrop-filter: blur(18px);
                z-index: 50;
            }
            .h-logo {
                width: 29px;
                height: 29px;
                border-radius: 8px;
                flex-shrink: 0;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Syne", sans-serif;
                font-weight: 800;
                font-size: 13px;
                color: #fff;
                box-shadow: 0 0 14px rgba(108, 142, 255, 0.4);
            }
            .h-title {
                font-family: "Syne", sans-serif;
                font-weight: 700;
                font-size: 15px;
                letter-spacing: -0.3px;
                background: linear-gradient(
                    90deg,
                    var(--text-hi),
                    var(--accent)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .h-badge {
                margin-left: auto;
                font-size: 9.5px;
                font-weight: 600;
                letter-spacing: 0.7px;
                text-transform: uppercase;
                padding: 3px 10px;
                border-radius: 99px;
                background: rgba(108, 142, 255, 0.1);
                border: 1px solid rgba(108, 142, 255, 0.22);
                color: var(--accent);
            }

            /* ══ BODY WRAP ══ */
            .body-wrap {
                flex: 1;
                min-height: 0;
                display: flex;
                align-items: stretch;
                overflow: hidden;
                position: relative;
            }

            /* ══ CHAT COLUMN ══
         Default: centered (margin auto), width 640px
         Open:    left side, width 380px, margin 0       */
            .chat-col {
                flex: 0 0 auto;
                width: 640px;
                max-width: 100%;
                margin: 0 auto; /* center */
                display: flex;
                flex-direction: column;
                padding: 24px 20px 18px;
                gap: 14px;
                transition:
                    width var(--t),
                    margin var(--t);
                will-change: width, margin;
            }
            .body-wrap.dash-open .chat-col {
                width: 380px;
                margin: 0; /* anchor left */
            }

            /* chat card */
            .chat-card {
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
                background: var(--glass);
                border: 1px solid var(--border);
                border-radius: 18px;
                backdrop-filter: blur(14px);
                overflow: hidden;
                box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
                transition: box-shadow var(--t);
            }

            .chat-messages {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 16px;
                padding: 22px 18px 12px;
            }

            /* bubbles */
            .bubble {
                font-size: 13.5px;
                line-height: 1.65;
                padding: 11px 14px;
                max-width: 85%;
                animation: bubIn 0.28s ease;
            }
            @keyframes bubIn {
                from {
                    opacity: 0;
                    transform: translateY(7px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .bubble-ai {
                align-self: flex-start;
                border-radius: 4px 16px 16px 16px;
                background: rgba(13, 20, 40, 0.78);
                border: 1px solid var(--border);
                color: var(--text-hi);
            }
            .ai-label {
                display: block;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 1.3px;
                color: var(--accent);
                text-transform: uppercase;
                margin-bottom: 5px;
            }
            .bubble-user {
                align-self: flex-end;
                border-radius: 16px 4px 16px 16px;
                background: linear-gradient(
                    135deg,
                    rgba(108, 142, 255, 0.22),
                    rgba(192, 132, 252, 0.18)
                );
                border: 1px solid rgba(108, 142, 255, 0.28);
                color: var(--text-hi);
            }

            /* input */
            .input-wrap {
                flex-shrink: 0;
                padding: 11px 14px;
                border-top: 1px solid var(--border);
                display: flex;
                gap: 9px;
                align-items: center;
                background: rgba(8, 12, 20, 0.6);
            }
            .chat-input {
                flex: 1;
                background: transparent;
                border: none;
                outline: none;
                font-family: "DM Sans", sans-serif;
                font-size: 13.5px;
                color: var(--text-hi);
            }
            .chat-input::placeholder {
                color: var(--text-lo);
            }
            .send-btn {
                flex-shrink: 0;
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 7px 15px;
                border-radius: 10px;
                border: none;
                cursor: pointer;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2)
                );
                font-family: "DM Sans", sans-serif;
                font-size: 13px;
                font-weight: 500;
                color: #fff;
                box-shadow: 0 3px 14px rgba(108, 142, 255, 0.32);
                transition:
                    opacity 0.15s,
                    transform 0.12s;
            }
            .send-btn:hover {
                opacity: 0.85;
                transform: translateY(-1px);
            }
            .send-btn:active {
                transform: translateY(0);
            }

            /* toggle pill */
            .toggle-pill {
                flex-shrink: 0;
                align-self: center;
                display: flex;
                align-items: center;
                gap: 7px;
                padding: 7px 20px;
                border-radius: 99px;
                border: 1px solid var(--border-hi);
                cursor: pointer;
                background: rgba(13, 20, 40, 0.8);
                color: var(--accent);
                font-family: "DM Sans", sans-serif;
                font-size: 12.5px;
                font-weight: 500;
                backdrop-filter: blur(10px);
                box-shadow: 0 2px 12px rgba(108, 142, 255, 0.1);
                transition:
                    background 0.18s,
                    box-shadow 0.18s;
            }
            .toggle-pill:hover {
                background: rgba(108, 142, 255, 0.14);
                box-shadow: 0 0 18px rgba(108, 142, 255, 0.25);
            }

            /* ══ DIVIDER ══ */
            .divider {
                flex-shrink: 0;
                width: 0;
                opacity: 0;
                border-left: 1px solid var(--border);
                transition: opacity var(--t);
            }
            .dash-open .divider {
                opacity: 1;
                width: 1px;
            }

            /* ══ DASHBOARD PANEL ══ */
            .dash-panel {
                flex: 0 1 0%;
                min-width: 0;
                overflow: hidden;
                transition: flex-basis var(--t);
                display: flex;
                flex-direction: column;
            }
            .dash-open .dash-panel {
                flex: 1 1 0%;
            }

            .dash-inner {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                padding: 22px 22px 18px 18px;
                gap: 14px;
                overflow: hidden;
                opacity: 0;
                transform: translateX(20px);
                transition:
                    opacity var(--t),
                    transform var(--t);
            }
            .dash-open .dash-inner {
                opacity: 1;
                transform: translateX(0);
            }

            /* tab bar */
            .tab-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }
            .tab-section-title {
                font-family: "Syne", sans-serif;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.8px;
                text-transform: uppercase;
                color: var(--text-lo);
            }
            .tabs {
                display: flex;
                gap: 5px;
            }
            .tab-btn {
                font-size: 11.5px;
                font-weight: 500;
                padding: 5px 14px;
                border-radius: 99px;
                border: 1px solid var(--border);
                background: transparent;
                color: var(--text-lo);
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                transition: all 0.15s;
            }
            .tab-btn:hover {
                color: var(--text-mid);
                border-color: var(--border-hi);
            }
            .tab-btn.active {
                background: rgba(108, 142, 255, 0.14);
                border-color: rgba(108, 142, 255, 0.42);
                color: #c8d8ff;
                box-shadow: 0 0 10px rgba(108, 142, 255, 0.15);
            }

            /* insight */
            .insight-card {
                flex-shrink: 0;
                background: linear-gradient(
                    135deg,
                    rgba(108, 142, 255, 0.07),
                    rgba(192, 132, 252, 0.05)
                );
                border: 1px solid rgba(108, 142, 255, 0.18);
                border-radius: 12px;
                padding: 12px 16px;
                font-size: 12.5px;
                color: var(--text-mid);
                line-height: 1.65;
                position: relative;
                overflow: hidden;
            }
            .insight-card::before {
                content: "✦ AI INSIGHT";
                display: block;
                font-size: 9px;
                font-weight: 700;
                color: var(--accent);
                letter-spacing: 1.5px;
                margin-bottom: 5px;
            }
            .insight-card::after {
                content: "";
                position: absolute;
                top: -28px;
                right: -28px;
                width: 75px;
                height: 75px;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    rgba(108, 142, 255, 0.13),
                    transparent 70%
                );
            }

            /* subtabs */
            .subtab-bar {
                display: flex;
                gap: 5px;
                flex-wrap: wrap;
                flex-shrink: 0;
            }
            .subtab-btn {
                font-size: 10.5px;
                font-weight: 500;
                padding: 4px 12px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: rgba(8, 12, 20, 0.55);
                color: var(--text-lo);
                cursor: pointer;
                font-family: "DM Sans", sans-serif;
                transition: all 0.15s;
            }
            .subtab-btn:hover {
                color: var(--text-mid);
            }
            .subtab-btn.active {
                background: rgba(34, 211, 238, 0.09);
                border-color: rgba(34, 211, 238, 0.32);
                color: #a5f3fc;
            }

            /* table */
            .table-wrap {
                flex: 1;
                min-height: 0;
                overflow: auto;
                border-radius: 12px;
                border: 1px solid var(--border);
                background: rgba(6, 10, 18, 0.55);
            }
            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 12px;
            }
            thead {
                position: sticky;
                top: 0;
                z-index: 2;
            }
            thead tr {
                background: rgba(10, 16, 30, 0.97);
                backdrop-filter: blur(8px);
            }
            th {
                padding: 9px 14px;
                text-align: left;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.9px;
                text-transform: uppercase;
                color: var(--text-lo);
                white-space: nowrap;
                border-bottom: 1px solid var(--border);
            }
            td {
                padding: 8px 14px;
                color: var(--text-hi);
                border-bottom: 1px solid rgba(99, 140, 255, 0.055);
                white-space: nowrap;
            }
            tbody tr {
                transition: background 0.1s;
            }
            tbody tr:hover {
                background: rgba(108, 142, 255, 0.06);
            }
            tbody tr:last-child td {
                border-bottom: none;
            }
            td:first-child {
                font-weight: 500;
            }
            td.risk-high {
                color: var(--danger);
            }
            td.risk-medium {
                color: var(--warn);
            }
            td.risk-low {
                color: var(--success);
            }

            /* chart */
            .chart-wrap {
                flex: 1;
                min-height: 0;
                border-radius: 12px;
                border: 1px solid var(--border);
                background: rgba(6, 10, 18, 0.55);
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .chart-canvas-wrap {
                flex: 1;
                min-height: 0;
                position: relative;
            }

            /* empty state */
            .empty-dash {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 12px;
                color: var(--text-lo);
                font-size: 13px;
                text-align: center;
            }
            .empty-icon {
                width: 52px;
                height: 52px;
                border-radius: 14px;
                background: rgba(108, 142, 255, 0.07);
                border: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
            }
        </style>
    </head>

    <body>
        <div id="root"></div>

        <script>
            const { useState, useEffect, useRef } = React;
            const e = React.createElement;

            const normalizeMessages = (messages) => {
                if (!Array.isArray(messages)) return [];
                return messages
                    .filter((m) => m && m.role && m.text)
                    .map((m) => ({ role: m.role, text: String(m.text) }));
            };

            const normalizeDashboard = (dashboard) => {
                if (!dashboard) return null;
                const text =
                    typeof dashboard.text === "string" ? dashboard.text : "";
                const tables = Array.isArray(dashboard.tables)
                    ? dashboard.tables
                    : [];
                const charts = Array.isArray(dashboard.charts)
                    ? dashboard.charts
                    : [];
                if (!text && tables.length === 0 && charts.length === 0)
                    return null;
                return { text, tables, charts };
            };

            const normalizePayload = (payload) => ({
                messages: normalizeMessages(payload?.messages),
                dashboard: normalizeDashboard(payload?.dashboard),
            });

            const PALETTE = [
                "rgba(108,142,255,.78)",
                "rgba(192,132,252,.78)",
                "rgba(34,211,238,.78)",
                "rgba(248,113,113,.78)",
                "rgba(52,211,153,.78)",
                "rgba(251,191,36,.78)",
            ];
            const RISK_CLS = {
                High: "risk-high",
                Medium: "risk-medium",
                Low: "risk-low",
            };

            /* ── components ── */
            function TabBtn({ label, active, onClick }) {
                return e(
                    "button",
                    {
                        className: "tab-btn" + (active ? " active" : ""),
                        onClick,
                    },
                    label,
                );
            }
            function SubtabBtn({ label, active, onClick }) {
                return e(
                    "button",
                    {
                        className: "subtab-btn" + (active ? " active" : ""),
                        onClick,
                    },
                    label,
                );
            }
            function DataTable({ table }) {
                if (!table) return null;
                return e(
                    "div",
                    { className: "table-wrap" },
                    e(
                        "table",
                        null,
                        e(
                            "thead",
                            null,
                            e(
                                "tr",
                                null,
                                ...table.columns.map((c, i) =>
                                    e("th", { key: i }, c),
                                ),
                            ),
                        ),
                        e(
                            "tbody",
                            null,
                            ...table.rows.map((row, ri) =>
                                e(
                                    "tr",
                                    { key: ri },
                                    ...table.columns.map((col, ci) => {
                                        const val = row[col] ?? "—";
                                        const cls =
                                            col === "Rủi ro"
                                                ? RISK_CLS[val] || ""
                                                : "";
                                        return e(
                                            "td",
                                            { key: ci, className: cls },
                                            val,
                                        );
                                    }),
                                ),
                            ),
                        ),
                    ),
                );
            }

            function DashContent({
                data,
                activeTab,
                setActiveTab,
                tIdx,
                setTIdx,
                cIdx,
                setCIdx,
                chartRef,
            }) {
                if (!data)
                    return e(
                        "div",
                        { className: "empty-dash" },
                        e("div", { className: "empty-icon" }, "📊"),
                        e("span", null, "Gửi câu hỏi để tải dashboard"),
                    );
                return e(
                    React.Fragment,
                    null,
                    e(
                        "div",
                        { className: "tab-bar" },
                        e(
                            "span",
                            { className: "tab-section-title" },
                            "Dashboard",
                        ),
                        e(
                            "div",
                            { className: "tabs" },
                            e(TabBtn, {
                                label: "Table",
                                active: activeTab === "table",
                                onClick: () => setActiveTab("table"),
                            }),
                            e(TabBtn, {
                                label: "Chart",
                                active: activeTab === "chart",
                                onClick: () => setActiveTab("chart"),
                            }),
                        ),
                    ),
                    e("div", { className: "insight-card" }, data.text),
                    e(
                        "div",
                        { className: "subtab-bar" },
                        ...(activeTab === "table"
                            ? data.tables
                            : data.charts
                        ).map((item, i) =>
                            e(SubtabBtn, {
                                key: i,
                                label: item.name,
                                active:
                                    (activeTab === "table" ? tIdx : cIdx) === i,
                                onClick: () =>
                                    activeTab === "table"
                                        ? setTIdx(i)
                                        : setCIdx(i),
                            }),
                        ),
                    ),
                    activeTab === "table"
                        ? e(DataTable, { table: data.tables[tIdx] })
                        : e(
                              "div",
                              { className: "chart-wrap" },
                              e(
                                  "div",
                                  { className: "chart-canvas-wrap" },
                                  e("canvas", { ref: chartRef }),
                              ),
                          ),
                );
            }

            /* ══ APP ══ */
            function App() {
                const [messages, setMessages] = useState([
                    {
                        role: "assistant",
                        text: "Chào bạn! Hãy hỏi mình bất kỳ thông tin học tập nào.",
                    },
                ]);
                const [input, setInput] = useState("");
                const [showDash, setShowDash] = useState(false);
                const [dashData, setDashData] = useState(null);
                const [activeTab, setActiveTab] = useState("table");
                const [tIdx, setTIdx] = useState(0);
                const [cIdx, setCIdx] = useState(0);

                const chartRef = useRef(null);
                const chartInst = useRef(null);
                const msgEnd = useRef(null);
                const canOpenDash =
                    dashData &&
                    dashData.tables &&
                    dashData.tables.length > 0 &&
                    dashData.charts &&
                    dashData.charts.length > 0;

                useEffect(() => {
                    if (!canOpenDash) setShowDash(false);
                }, [canOpenDash]);

                const applyPayload = (payload) => {
                    const normalized = normalizePayload(payload);
                    if (!normalized) return;

                    if (normalized.messages.length) {
                        setMessages((prev) => [
                            ...prev,
                            ...normalized.messages,
                        ]);
                    }

                    if (normalized.dashboard) {
                        setDashData(normalized.dashboard);
                        setShowDash(true);
                        setActiveTab("table");
                        setTIdx(0);
                        setCIdx(0);
                    }
                };

                useEffect(() => {
                    window.receiveModelPayload = applyPayload;
                    return () => {
                        delete window.receiveModelPayload;
                    };
                }, []);

                useEffect(() => {
                    msgEnd.current?.scrollIntoView({ behavior: "smooth" });
                }, [messages]);

                useEffect(() => {
                    if (!dashData || !showDash || activeTab !== "chart") {
                        chartInst.current?.destroy();
                        chartInst.current = null;
                        return;
                    }
                    const charts = dashData.charts || [];
                    if (!charts.length) return;
                    const cur = charts[Math.min(cIdx, charts.length - 1)];
                    chartInst.current?.destroy();
                    chartInst.current = new Chart(chartRef.current, {
                        type: "bar",
                        data: {
                            labels: cur.labels,
                            datasets: [
                                {
                                    label: cur.name,
                                    data: cur.data,
                                    backgroundColor: cur.data.map(
                                        (_, i) => PALETTE[i % PALETTE.length],
                                    ),
                                    borderColor: cur.data.map((_, i) =>
                                        PALETTE[i % PALETTE.length].replace(
                                            ".78",
                                            "1",
                                        ),
                                    ),
                                    borderWidth: 1.5,
                                    borderRadius: 7,
                                },
                            ],
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: "rgba(8,12,20,.95)",
                                    borderColor: "rgba(108,142,255,.3)",
                                    borderWidth: 1,
                                    titleColor: "#8da0c8",
                                    bodyColor: "#c8d8ff",
                                    padding: 10,
                                    cornerRadius: 8,
                                },
                            },
                            scales: {
                                x: {
                                    grid: { color: "rgba(99,140,255,.07)" },
                                    ticks: {
                                        color: "#4a5a80",
                                        font: { size: 11 },
                                    },
                                },
                                y: {
                                    beginAtZero: true,
                                    grid: { color: "rgba(99,140,255,.07)" },
                                    ticks: {
                                        color: "#4a5a80",
                                        font: { size: 11 },
                                    },
                                },
                            },
                        },
                    });
                }, [dashData, showDash, activeTab, cIdx]);

                const handleSend = () => {
                    const q = input.trim();
                    if (!q) return;
                    setMessages((prev) => [...prev, { role: "user", text: q }]);
                    setInput("");
                };

                /* SVG arrows */
                const Arrow = (dir) =>
                    e(
                        "svg",
                        {
                            width: 14,
                            height: 14,
                            viewBox: "0 0 24 24",
                            fill: "none",
                            stroke: "currentColor",
                            strokeWidth: 2.3,
                            strokeLinecap: "round",
                            strokeLinejoin: "round",
                        },
                        dir === "right"
                            ? e("polyline", { points: "9 18 15 12 9 6" })
                            : e("polyline", { points: "15 18 9 12 15 6" }),
                    );

                return e(
                    "div",
                    {
                        style: {
                            display: "flex",
                            flexDirection: "column",
                            height: "100%",
                        },
                    },

                    /* HEADER */
                    e(
                        "header",
                        { className: "header" },
                        e("div", { className: "h-logo" }, "Σ"),
                        e("span", { className: "h-title" }, "EduAI Analytics"),
                        e("span", { className: "h-badge" }, "Beta"),
                    ),

                    /* BODY */
                    e(
                        "div",
                        {
                            className:
                                "body-wrap" +
                                (showDash && canOpenDash ? " dash-open" : ""),
                        },

                        /* chat column */
                        e(
                            "div",
                            { className: "chat-col" },

                            e(
                                "div",
                                { className: "chat-card" },

                                /* messages */
                                e(
                                    "div",
                                    { className: "chat-messages" },
                                    ...messages.map((m, i) =>
                                        m.role === "assistant"
                                            ? e(
                                                  "div",
                                                  {
                                                      key: i,
                                                      className:
                                                          "bubble bubble-ai",
                                                  },
                                                  e(
                                                      "span",
                                                      { className: "ai-label" },
                                                      "AI",
                                                  ),
                                                  m.text,
                                              )
                                            : e(
                                                  "div",
                                                  {
                                                      key: i,
                                                      className:
                                                          "bubble bubble-user",
                                                  },
                                                  m.text,
                                              ),
                                    ),
                                    e("div", { ref: msgEnd }),
                                ),

                                /* input */
                                e(
                                    "div",
                                    { className: "input-wrap" },
                                    e("input", {
                                        className: "chat-input",
                                        placeholder: "Nhập câu hỏi của bạn…",
                                        value: input,
                                        onChange: (ev) =>
                                            setInput(ev.target.value),
                                        onKeyDown: (ev) =>
                                            ev.key === "Enter" && handleSend(),
                                    }),
                                    e(
                                        "button",
                                        {
                                            className: "send-btn",
                                            onClick: handleSend,
                                        },
                                        e(
                                            "svg",
                                            {
                                                width: 13,
                                                height: 13,
                                                viewBox: "0 0 24 24",
                                                fill: "none",
                                                stroke: "currentColor",
                                                strokeWidth: 2.2,
                                            },
                                            e("line", {
                                                x1: 22,
                                                y1: 2,
                                                x2: 11,
                                                y2: 13,
                                            }),
                                            e("polygon", {
                                                points: "22 2 15 22 11 13 2 9 22 2",
                                            }),
                                        ),
                                        "Gửi",
                                    ),
                                ),
                            ),

                            /* toggle pill — below card */
                            canOpenDash
                                ? e(
                                      "button",
                                      {
                                          className: "toggle-pill",
                                          onClick: () => setShowDash((v) => !v),
                                      },
                                      Arrow(showDash ? "left" : "right"),
                                      showDash
                                          ? "Ẩn Dashboard"
                                          : "Mở Dashboard",
                                  )
                                : null,
                        ),

                        /* divider */
                        e("div", { className: "divider" }),

                        /* dashboard */
                        e(
                            "div",
                            { className: "dash-panel" },
                            e(
                                "div",
                                { className: "dash-inner" },
                                e(DashContent, {
                                    data: dashData,
                                    activeTab,
                                    setActiveTab,
                                    tIdx,
                                    setTIdx,
                                    cIdx,
                                    setCIdx,
                                    chartRef,
                                }),
                            ),
                        ),
                    ),
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(e(App));
        </script>
    </body>
</html>
